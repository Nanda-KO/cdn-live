name: Update Live & Event Playlist

on:
  schedule:
    - cron: '*/10 * * * *'    
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests playwright
    - name: Install Playwright Browsers & OS Dependencies
      run: playwright install chromium --with-deps

    - name: Run Scraper Script
      run: python src/channels.py
      
    - name: Run Scraper Script
      run: python src/liveevents.py

    - name: Commit and Push Playlist
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add live_tv_channels.m3u
        git add liveevents.m3u
        
        # Check if there are actually changes to commit to avoid empty commit errors
        if git diff-index --quiet HEAD --; then
          echo "No changes to playlist, skipping commit."
        else
          git commit -m "Auto-update live_tv_channels.m3u"
          git commit -m "Auto-update liveevents.m3u"
          
          # Pull remote changes and rebase BEFORE pushing to prevent rejection errors
          git pull --rebase origin main
          git push origin main
        fi
